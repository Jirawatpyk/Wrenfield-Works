# Local development database only. Production uses a managed PostgreSQL 16
# instance in the Asia-Pacific (Singapore) region for PDPA data residency.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wrenfield
      POSTGRES_PASSWORD: wrenfield
      POSTGRES_DB: wrenfield
    ports:
      - '5432:5432'
    volumes:
      - wrenfield_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wrenfield -d wrenfield']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wrenfield_pgdata:
