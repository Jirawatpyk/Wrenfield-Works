<svg xmlns="http://www.w3.org/2000/svg" width="80" height="48" viewBox="0 0 80 48">
  <defs>
    <pattern id="lattice" width="80" height="48" patternUnits="userSpaceOnUse">
      <polyline points="0,36 20,12 40,36 60,12 80,36" fill="none" stroke="#B5894A" stroke-width="1.4" opacity=".4"></polyline>
      <circle cx="0" cy="36" r="2.3" fill="#B5894A" opacity=".5"></circle>
      <circle cx="20" cy="12" r="2.3" fill="#B5894A" opacity=".5"></circle>
      <circle cx="40" cy="36" r="2.3" fill="#B5894A" opacity=".5"></circle>
      <circle cx="60" cy="12" r="2.3" fill="#B5894A" opacity=".5"></circle>
      <circle cx="80" cy="36" r="2.3" fill="#B5894A" opacity=".5"></circle>
    </pattern>
  </defs>
  <rect width="80" height="48" fill="url(#lattice)"></rect>
</svg>